# ════════════════════════════════════════════════════
# nginx.conf — добавьте этот блок внутрь вашего server {}
# который обслуживает portal.farovon.tj
#
# Обычно файл: /etc/nginx/sites-available/portal.farovon.tj
# или: /etc/nginx/conf.d/portal.farovon.tj.conf
# ════════════════════════════════════════════════════

# Добавьте ВНУТРЬ существующего server { ... } блока:

    # ── Сервис лимитов ──────────────────────────────
    location /limits/ {
        proxy_pass         http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
        proxy_connect_timeout 10;

        # Только для внутренней сети (рекомендуется)
        # allow 10.0.0.0/8;
        # allow 192.168.0.0/16;
        # deny  all;
    }

    location /limits/webhook/ {
        proxy_pass         http://127.0.0.1:8001/webhook/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Вебхук доступен всегда (нужен для роботов Б24)
    }


